<main class="app-container">
  <header class="app-header">
    <h1>🎯 {{ title }}</h1>
    <p class="app-subtitle">Gerencie suas tarefas diárias com eficiência.</p>
  </header>

  <section class="todo-card">
    <form (submit)="addTodo(); $event.preventDefault()" class="todo-form">
      <div class="input-group">
        <input 
          type="text" 
          placeholder="O que você precisa fazer hoje?" 
          [ngModel]="newTodoTitle()"
          (ngModelChange)="newTodoTitle.set($event)"
          name="todoTitle"
          maxlength="255"
          aria-label="Nova tarefa"
          required
        />
        <button type="submit" [disabled]="!newTodoTitle().trim()" class="btn-primary">
          <span>Adicionar</span>
        </button>
      </div>
    </form>

    <div class="todo-list-wrapper">
      @if (todos().length > 0) {
        <ul class="todo-list">
          @for (todo of todos(); track todo.id) {
            <li class="todo-item" [class.completed]="todo.completed">
              <div class="todo-content">
                <span class="todo-title">{{ todo.title }}</span>
              </div>
              <button 
                type="button" 
                class="btn-delete" 
                (click)="removeTodo(todo.id)" 
                aria-label="Excluir tarefa"
              >
                🗑️
              </button>
            </li>
          }
        </ul>
      } @else {
        <div class="empty-state">
          <span class="empty-icon">🎉</span>
          <p>Muito bem! Você não tem tarefas pendentes.</p>
        </div>
      }
    </div>

    <footer class="card-footer">
      <span>Total: <strong>{{ todos().length }}</strong> tarefas</span>
    </footer>
  </section>
</main>
